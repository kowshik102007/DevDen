<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Consumption Predictor</title>

    <!-- Chart.js for dashboard chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart Energy Consumption Predictor</h1>
        <p class="subtitle">
            Predict appliance energy consumption using temperature, humidity, date, and time.
        </p>

        <div class="card">
            <h2>Enter Details</h2>

            <form id="predictionForm">
                <label for="temperature">Outdoor Temperature</label>
                <input type="number" id="temperature" step="0.1" placeholder="Example: 28" required>

                <label for="humidity">Outdoor Humidity</label>
                <input type="number" id="humidity" step="0.1" placeholder="Example: 65" required>

                <label for="date">Date</label>
                <input type="date" id="date" required>

                <label for="hour">Hour of Day</label>
                <input type="number" id="hour" min="0" max="23" placeholder="Example: 18" required>

                <label for="rate">Electricity Rate per Unit ₹</label>
                <input type="number" id="rate" step="0.1" placeholder="Example: 8" required>

                <label for="rangeInfo">Usage Level Ranges</label>
                <select id="rangeInfo">
                    <option value="">View usage level ranges</option>
                    <option value="low">Low Usage: Less than 50 Wh</option>
                    <option value="medium">Medium Usage: 50 Wh to 99.99 Wh</option>
                    <option value="high">High Usage: 100 Wh and above</option>
                </select>

                <button type="submit">Predict Energy Consumption</button>
            </form>
        </div>

        <div class="result-card" id="resultCard">
            <h2>Prediction Result</h2>
            <p id="predictionText"></p>
            <p id="usageLevel"></p>
            <p id="suggestion"></p>
        </div>

        <div class="card">
            <h2>Energy Prediction Dashboard</h2>
            <canvas id="energyChart"></canvas>
        </div>

        <div class="card">
            <h2>Prediction History</h2>

            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Hour</th>
                        <th>Energy</th>
                        <th>Cost</th>
                        <th>Level</th>
                    </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>

            <button onclick="clearHistory()" class="clear-btn">Clear History</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
