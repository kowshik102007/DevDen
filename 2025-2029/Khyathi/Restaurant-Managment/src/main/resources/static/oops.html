<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Restaurant Reservation System</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; background: #f5f5f5; }
  h1   { text-align: center; color: #c0392b; }
  h2   { color: #2c3e50; border-bottom: 2px solid #c0392b; padding-bottom: 6px; }
  .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;
             box-shadow: 0 2px 6px rgba(0,0,0,0.1); display:none; }
  .section.active { display: block; }
  label  { display: block; margin-top: 10px; font-weight: bold; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc;
                  border-radius: 4px; box-sizing: border-box; }
  button { margin-top: 14px; padding: 10px 20px; background: #c0392b; color: white;
           border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
  button:hover { background: #a93226; }
  .msg { margin-top: 12px; padding: 10px; border-radius: 4px; background: #eaf4fb;
         color: #1a5276; font-weight: bold; }
  .err { background: #fdecea; color: #c0392b; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #c0392b; color: white; }
  pre { background: #ecf0f1; padding: 12px; border-radius: 4px; }
</style>
</head>
<body>

<h1>🍽 Restaurant Reservation System</h1>

<!-- SECTION 1: REGISTER -->
<div class="section active" id="sec-register">
  <h2>1. Customer Registration</h2>
  <label>Customer ID</label>
  <input id="reg-id" placeholder="e.g. C001"/>
  <label>Full Name</label>
  <input id="reg-name" placeholder="e.g. Rahul Kumar"/>
  <label>Mobile Number</label>
  <input id="reg-phone" type="number" placeholder="10-digit number"/>
  <label>Password (numeric)</label>
  <input id="reg-pass" type="password" placeholder="e.g. 1234"/>
  <button onclick="register()">Register</button>
  <div class="msg" id="reg-msg" style="display:none"></div>
</div>

<!-- SECTION 2: LOGIN -->
<div class="section" id="sec-login">
  <h2>2. Login</h2>
  <label>Customer ID</label>
  <input id="login-id" placeholder="Same ID used during registration"/>
  <label>Password</label>
  <input id="login-pass" type="password"/>
  <button onclick="login()">Login</button>
  <div class="msg" id="login-msg" style="display:none"></div>
</div>

<!-- SECTION 3: SELECT RESTAURANT -->
<div class="section" id="sec-restaurant">
  <h2>3. Select Restaurant</h2>
  <select id="restaurant-select"></select>
  <button onclick="selectRestaurant()">Select</button>
  <div class="msg" id="restaurant-msg" style="display:none"></div>
</div>

<!-- SECTION 4: ADD TABLES -->
<div class="section" id="sec-tables">
  <h2>4. Add Tables</h2>
  <label>Table ID (number)</label>
  <input id="table-id" type="number" placeholder="e.g. 101"/>
  <label>Table Type</label>
  <select id="table-type">
    <option value="1">2-Seater</option>
    <option value="2">4-Seater</option>
  </select>
  <button onclick="addTable()">Add Table</button>
  <button onclick="doneAddingTables()">Done — Proceed to Booking</button>
  <div class="msg" id="table-msg" style="display:none"></div>
  <div id="table-list"></div>
</div>

<!-- SECTION 5: BOOK TABLE -->
<div class="section" id="sec-book">
  <h2>5. Book a Table</h2>
  <div id="available-tables"></div>
  <label>Enter Table ID to Book</label>
  <input id="book-id" type="number"/>
  <button onclick="bookTable()">Book Table</button>
  <button onclick="joinWaiting()">Join Waiting List Instead</button>
  <div class="msg" id="book-msg" style="display:none"></div>
</div>

<!-- SECTION 6: PAYMENT -->
<div class="section" id="sec-payment">
  <h2>6. Payment</h2>
  <p id="payment-amount" style="font-size:18px; font-weight:bold;"></p>
  <button onclick="pay()">✅ Pay Now</button>
  <button onclick="cancelReservation()" style="background:#7f8c8d;">❌ Cancel Reservation</button>
  <div class="msg" id="payment-msg" style="display:none"></div>
</div>

<!-- SECTION 7: CONFIRMATION -->
<div class="section" id="sec-confirm">
  <h2>7. Reservation Confirmed!</h2>
  <pre id="receipt-box"></pre>
  <h3>Your Reservations</h3>
  <table>
    <thead><tr><th>Reservation ID</th><th>Table</th><th>Date</th><th>Status</th></tr></thead>
    <tbody id="reservations-body"></tbody>
  </table>
  <p style="text-align:center; margin-top:20px; font-size:18px;">✅ Thank you for your reservation!</p>
</div>

<script>
const BASE = "/api";

function show(id)   { document.getElementById(id).classList.add("active"); }
function hide(id)   { document.getElementById(id).classList.remove("active"); }
function msg(id, text, isErr) {
  const el = document.getElementById(id);
  el.style.display = "block";
  el.className = "msg" + (isErr ? " err" : "");
  el.innerText = text;
}

async function register() {
  const body = {
    customerId:   document.getElementById("reg-id").value.trim(),
    customerName: document.getElementById("reg-name").value.trim(),
    mobileNumber: document.getElementById("reg-phone").value.trim(),
    password:     document.getElementById("reg-pass").value.trim()
  };
  if (!body.customerId || !body.customerName || !body.mobileNumber || !body.password)
    return msg("reg-msg", "Please fill all fields.", true);
  const res  = await fetch(`${BASE}/register`, {method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  const data = await res.json();
  msg("reg-msg", data.message);
  hide("sec-register");
  show("sec-login");
}

async function login() {
  const body = {
    customerId: document.getElementById("login-id").value.trim(),
    password:   document.getElementById("login-pass").value.trim()
  };
  const res  = await fetch(`${BASE}/login`, {method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  const data = await res.json();
  if (data.message === "FAIL") return msg("login-msg", "Invalid ID or Password.", true);
  msg("login-msg", data.message);
  hide("sec-login");
  await loadRestaurants();
  show("sec-restaurant");
}

async function loadRestaurants() {
  const data = await (await fetch(`${BASE}/restaurants`)).json();
  const sel  = document.getElementById("restaurant-select");
  sel.innerHTML = "";
  data.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r.index;
    opt.text  = r.name;
    sel.appendChild(opt);
  });
}

async function selectRestaurant() {
  const choice = document.getElementById("restaurant-select").value;
  const res  = await fetch(`${BASE}/selectRestaurant`, {method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify({choice})});
  const data = await res.json();
  msg("restaurant-msg", data.message);
  hide("sec-restaurant");
  show("sec-tables");
}

async function addTable() {
  const tableId    = document.getElementById("table-id").value.trim();
  const typeChoice = document.getElementById("table-type").value;
  if (!tableId) return msg("table-msg", "Enter a Table ID.", true);
  const res  = await fetch(`${BASE}/addTable`, {method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify({tableId, typeChoice})});
  const data = await res.json();
  msg("table-msg", data.message);
  refreshTableList();
}

async function refreshTableList() {
  const tables = await (await fetch(`${BASE}/tables`)).json();
  const div = document.getElementById("table-list");
  if (!tables.length) { div.innerHTML = ""; return; }
  let html = "<table><thead><tr><th>ID</th><th>Capacity</th><th>Available</th></tr></thead><tbody>";
  tables.forEach(t => {
    html += `<tr><td>${t.tableId}</td><td>${t.capacity}</td><td>${t.available}</td></tr>`;
  });
  html += "</tbody></table>";
  div.innerHTML = html;
}

async function doneAddingTables() {
  const tables = await (await fetch(`${BASE}/tables`)).json();
  hide("sec-tables");
  const div = document.getElementById("available-tables");
  let html = "<p>Available Tables:</p><table><thead><tr><th>ID</th><th>Capacity</th><th>Available</th></tr></thead><tbody>";
  tables.forEach(t => {
    html += `<tr><td>${t.tableId}</td><td>${t.capacity}</td><td>${t.available==="true"?"✅ Yes":"❌ No"}</td></tr>`;
  });
  html += "</tbody></table>";
  div.innerHTML = html;
  show("sec-book");
}

async function bookTable() {
  const tableId = document.getElementById("book-id").value.trim();
  if (!tableId) return msg("book-msg", "Enter a Table ID.", true);
  const res  = await fetch(`${BASE}/bookTable`, {method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify({tableId})});
  const data = await res.json();
  if (data.message === "NOT_AVAILABLE")
    return msg("book-msg", "Table not available. Try another or join waiting list.", true);
  if (data.message === "TABLE_NOT_FOUND")
    return msg("book-msg", "Table ID not found.", true);
  msg("book-msg", data.message);
  document.getElementById("payment-amount").innerText = "Total Amount: Rs." + data.amount;
  hide("sec-book");
  show("sec-payment");
}

async function joinWaiting() {
  const res  = await fetch(`${BASE}/waitingList`, {method:"POST"});
  const data = await res.json();
  msg("book-msg", data.message);
}

async function pay() {
  const res  = await fetch(`${BASE}/pay`, {method:"POST"});
  const data = await res.json();
  msg("payment-msg", data.message);
  document.getElementById("receipt-box").innerText = data.receipt;
  hide("sec-payment");
  await loadReservations();
  show("sec-confirm");
}

async function cancelReservation() {
  const res  = await fetch(`${BASE}/cancel`, {method:"POST"});
  const data = await res.json();
  msg("payment-msg", data.message, true);
  hide("sec-payment");
}

async function loadReservations() {
  const list = await (await fetch(`${BASE}/reservations`)).json();
  const tbody = document.getElementById("reservations-body");
  tbody.innerHTML = "";
  list.forEach(r => {
    tbody.innerHTML += `<tr>
      <td>${r.reservationId}</td><td>${r.table}</td>
      <td>${r.date}</td><td>${r.status}</td>
    </tr>`;
  });
}
</script>
</body>
</html>
