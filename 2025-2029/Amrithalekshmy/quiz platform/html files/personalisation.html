<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Settings – QuizCraft</title>
  <link rel="stylesheet" href="personalisation.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">📝 QuizCraft</div>
    <div class="nav-right">
      <a href="teacher_dashboard.html" class="nav-link">← Dashboard</a>
      <button class="nav-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrap">

    <div class="page-header">
      <h2>Quiz Settings</h2>
      <p>Personalise your quiz before adding questions.</p>
    </div>

    <div class="settings-card">

      <div class="form-group">
        <label>Quiz Title <span class="req">*</span></label>
        <input type="text" id="quizTitle" placeholder="e.g. Chapter 3 – Motion & Force" />
      </div>

      <div class="form-group">
        <label>Subject / Topic</label>
        <input type="text" id="quizSubject" placeholder="e.g. Physics, General Knowledge…" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Number of Questions <span class="req">*</span></label>
          <input type="number" id="numQuestions" min="1" max="50" placeholder="e.g. 10" />
        </div>
        <div class="form-group">
          <label>Time Limit (minutes) <span class="req">*</span></label>
          <input type="number" id="timerMins" min="1" max="180" placeholder="e.g. 15" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Marks per Correct Answer</label>
          <input type="number" id="marksCorrect" min="1" value="2" />
        </div>
        <div class="form-group">
          <label>Negative Marking (per wrong)</label>
          <input type="number" id="marksNegative" min="0" step="0.5" value="0" />
        </div>
      </div>

      <div class="form-group">
        <label>Shuffle Questions for each student?</label>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="shuffleToggle" checked />
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label" id="shuffleLabel">Yes – questions will be shuffled</span>
        </div>
      </div>

      <div class="form-group">
        <label>Show Correct Answers after submission?</label>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="showAnswersToggle" />
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label" id="showAnswersLabel">No – only show score</span>
        </div>
      </div>

      <p class="error-msg hidden" id="settingsError">Please fill in all required fields.</p>

      <button class="btn-primary" onclick="saveAndProceed()">Continue to Add Questions →</button>

    </div>
  </div>

  <script src="personalisation.js"></script>
</body>
</html>
