<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizCraft – Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="brand">
        <span class="brand-icon">📝</span>
        <h1 class="brand-name">QuizCraft</h1>
        <p class="brand-tagline">Create. Share. Learn.</p>
      </div>

    
      <div class="tab-row">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>


      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="loginRole">
            <option value="teacher">Teacher / Faculty</option>
            <option value="student">Student</option>
          </select>
        </div>
        <p class="error-msg hidden" id="loginError">Invalid email or password.</p>
        <button class="btn-primary" onclick="doLogin()">Login</button>
      </div>


      <div id="registerForm" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Create a password" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="regRole">
            <option value="teacher">Teacher / Faculty</option>
            <option value="student">Student</option>
          </select>
        </div>
        <p class="error-msg hidden" id="registerError">Something went wrong.</p>
        <p class="success-msg hidden" id="registerSuccess">Registered! Please login.</p>
        <button class="btn-primary" onclick="doRegister()">Create Account</button>
      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
