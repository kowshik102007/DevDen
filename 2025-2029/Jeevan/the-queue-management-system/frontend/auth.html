<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | QueueEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="container">
        <a href="index.html" class="logo">QueueEase</a>
    </nav>

    <main class="container" style="max-width: 500px;">
        <div class="card glass animate-fade">
            <div id="auth-tabs" style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <button class="btn btn-primary" style="flex: 1;" id="tab-login">Login</button>
                <button class="btn btn-secondary" style="flex: 1;" id="tab-register">Register</button>
            </div>

            <form id="login-form">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <form id="register-form" style="display: none;">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="Min 6 characters">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div id="auth-error" style="color: var(--error); margin-top: 1rem; text-align: center; font-size: 0.9rem; min-height: 1.2rem;"></div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
